<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard — JobPortal</title>
  <meta name="description" content="Manage your job postings and view applicants on JobPortal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav>
    <span class="nav-brand">⚡ JobPortal</span>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="dashboard-header">
    <h1 id="greeting">Employer Dashboard</h1>
    <p>Manage your job postings and review applicants.</p>
  </div>

  <!-- ── Tabs ── -->
  <div style="padding: 0 5% 24px; display:flex; gap:8px; border-bottom:1px solid var(--surface2); margin-bottom:24px;">
    <button id="tab-jobs" class="btn btn-primary btn-sm" onclick="showTab('jobs')">My Jobs</button>
    <button id="tab-post" class="btn btn-outline btn-sm" onclick="showTab('post')">+ Post a Job</button>
  </div>

  <!-- ── My Jobs Panel ── -->
  <div id="panel-jobs" class="section" style="padding-top:0">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Location</th>
            <th>Type</th>
            <th>Posted</th>
            <th>Applicants</th>
          </tr>
        </thead>
        <tbody id="jobs-table-body">
          <tr>
            <td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Applicants Sub-panel ── -->
  <div id="panel-applicants" style="display:none" class="section" style="padding-top:0">
    <div class="flex justify-between items-center mb-4">
      <h2 id="applicants-title" class="section-title" style="margin-bottom:0">Applicants</h2>
      <button class="btn btn-outline btn-sm"
        onclick="document.getElementById('panel-applicants').style.display='none'">← Back</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Applied</th>
            <th>Status</th>
            <th>Actions</th>
            <th>Resume</th>
          </tr>
        </thead>
        <tbody id="applicants-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Post Job Panel ── -->
  <div id="panel-post" class="section" style="padding-top:0;display:none">
    <div style="max-width:600px">
      <h2 style="margin-bottom:24px;font-size:1.3rem;font-weight:700">Post a New Job</h2>
      <div id="post-error" style="color:var(--danger);margin-bottom:12px;display:none;"></div>
      <div id="post-success" style="color:var(--success);margin-bottom:12px;display:none;"></div>
      <form id="post-form" onsubmit="handlePostJob(event)">
        <div class="form-group"><label>Job Title</label><input id="p-title" placeholder="e.g. Frontend Developer"
            minlength="3" title="Must be at least 3 characters" required></div>
        <div class="form-group"><label>Company Name</label><input id="p-company" placeholder="e.g. Acme Corp" minlength="2" required>
        </div>
        <div class="form-group"><label>Location</label><input id="p-location" placeholder="e.g. Bangalore, Remote"
            minlength="2" required></div>
        <div class="form-group">
          <label>Job Type</label>
          <select id="p-type" required>
            <option value="">Select type</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Internship</option>
            <option>Remote</option>
          </select>
        </div>
        <div class="form-group"><label>Description</label><textarea id="p-desc"
            placeholder="Describe the role, requirements, benefits…"></textarea></div>
        <button id="post-btn" class="btn btn-primary form-submit" type="submit">Post Job →</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = requireLogin('employer');
    if (user) {
      renderNav();
      document.getElementById('greeting').textContent = 'Welcome, ' + user.name + ' 👋';

      window.showTab = function (tab) {
        document.getElementById('panel-jobs').style.display = tab === 'jobs' ? 'block' : 'none';
        document.getElementById('panel-post').style.display = tab === 'post' ? 'block' : 'none';
        document.getElementById('panel-applicants').style.display = 'none';
        document.getElementById('tab-jobs').className = tab === 'jobs' ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
        document.getElementById('tab-post').className = tab === 'post' ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
      }

      async function loadMyJobs() {
        const res = await apiFetch('/jobs');
        const jobs = await res.json();
        const mine = jobs.filter(j => j.employerId == user.id);
        const tbody = document.getElementById('jobs-table-body');

        if (!mine.length) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="big">📋</div>No jobs posted yet.</div></td></tr>`;
          return;
        }

        // Fetch applicant counts for all jobs at the same time (in parallel)
        // Promise.all() waits for ALL the fetch promises to finish before continuing
        const countPromises = mine.map(async (j) => {
          const r    = await apiFetch('/job-applicants/' + j.id);  // fetch applicants list
          const data = await r.json();
          // data is an array of applicants; .length gives the count
          return Array.isArray(data) ? data.length : 0;
        });

        // Wait for all counts to resolve, then build the table
        const counts = await Promise.all(countPromises);

        tbody.innerHTML = mine.map((j, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${j.title}</strong></td>
          <td>${j.location}</td>
          <td><span class="tag">${j.type}</span></td>
          <td>${formatDate(j.postedDate)}</td>
          <!-- Show the count in the button label: counts[i] matches mine[i] by index -->
          <td><button class="btn btn-accent btn-sm" onclick="viewApplicants(${j.id}, '${j.title}')">View Applicants (${counts[i]})</button></td>
        </tr>
      `).join('');
      }

      window.viewApplicants = async function (jobId, jobTitle) {
        document.getElementById('applicants-title').textContent = 'Applicants for: ' + jobTitle;
        document.getElementById('panel-applicants').style.display = 'block';
        document.getElementById('applicants-body').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">Loading…</td></tr>';

        const res = await apiFetch('/job-applicants/' + jobId);
        const data = await res.json();

        if (!data.length) {
          document.getElementById('applicants-body').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="big">👤</div>No applicants yet.</div></td></tr>`;
          return;
        }

        document.getElementById('applicants-body').innerHTML = data.map((a, i) => `
        <tr id="row-${a.applicationId}">
          <td>${i + 1}</td>
          <td><strong>${a.seekerName}</strong></td>
          <td>${a.seekerEmail}</td>
          <td>${formatDate(a.appliedDate)}</td>
          <td><span class="${badgeClass(a.status)}" id="badge-${a.applicationId}">${a.status}</span></td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-success btn-sm" onclick="updateStatus(${a.applicationId}, 'Shortlisted')">✅ Shortlist</button>
            <button class="btn btn-danger btn-sm" onclick="updateStatus(${a.applicationId}, 'Rejected')">❌ Reject</button>
          </td>
          <td>
            <!-- Opens /resume/{seekerId} in a new browser tab.
                 The backend sets Content-Disposition: attachment so the browser downloads it. -->
            <a href="http://localhost:8080/resume/${a.seekerId}"
               target="_blank"
               class="btn btn-outline btn-sm"
               onclick="addAuthHeaders(event, ${a.seekerId})">
              📥 Download
            </a>
          </td>
        </tr>
      `).join('');
      }

      window.updateStatus = async function (appId, status) {
        const res = await apiFetch('/update-status', { method: 'POST', body: JSON.stringify({ applicationId: appId, status }) });
        if (res.ok) {
          const badge = document.getElementById('badge-' + appId);
          if (badge) { badge.textContent = status; badge.className = badgeClass(status); }
        }
      }

      window.handlePostJob = async function (e) {
        e.preventDefault();
        const errEl = document.getElementById('post-error');
        const sucEl = document.getElementById('post-success');
        const btn = document.getElementById('post-btn');
        errEl.style.display = 'none'; sucEl.style.display = 'none';
        btn.textContent = 'Posting…'; btn.disabled = true;

        const body = {
          title: document.getElementById('p-title').value.trim(),
          company: document.getElementById('p-company').value.trim(),
          location: document.getElementById('p-location').value.trim(),
          type: document.getElementById('p-type').value,
          description: document.getElementById('p-desc').value.trim(),
        };

        const res = await apiFetch('/jobs/add', { method: 'POST', body: JSON.stringify(body) });
        if (res.ok) {
          sucEl.textContent = '✅ Job posted successfully!';
          sucEl.style.display = 'block';
          document.getElementById('post-form').reset();
          loadMyJobs();
        } else {
          const data = await res.json();
          errEl.textContent = data.error || 'Failed to post job.';
          errEl.style.display = 'block';
        }
        btn.textContent = 'Post Job →'; btn.disabled = false;
      }

      loadMyJobs();

      // ── Download Resume helper ────────────────────────────────────────────────
      // The <a href="..." target="_blank"> would work BUT the backend checks
      // X-User-Role header for auth — a plain link doesn't send custom headers.
      //
      // Solution: intercept the click, use fetch() with headers, then create a
      // temporary blob URL and click it programmatically to trigger the download.
      window.addAuthHeaders = async function (event, seekerId) {
        event.preventDefault(); // stop the normal link navigation

        const user = getUser();
        const res  = await fetch('http://localhost:8080/resume/' + seekerId, {
          method:      'GET',
          credentials: 'include',
          headers: {
            'X-User-Id':   user.id,
            'X-User-Role': user.role,
          },
        });

        if (!res.ok) {
          alert('Resume not available for this applicant.');
          return;
        }

        // Convert the response to a Blob (binary file data)
        const blob = await res.blob();
        // Create a temporary invisible URL pointing to the blob in memory
        const url  = window.URL.createObjectURL(blob);
        // Create a hidden <a> element and programmatically click it to download
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'resume_' + seekerId; // suggested file name for download
        a.click();
        // Free the blob URL from memory after a short delay
        window.URL.revokeObjectURL(url);
      };
    }
  </script>
</body>

</html>
