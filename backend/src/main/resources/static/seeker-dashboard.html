<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications — JobPortal</title>
  <meta name="description" content="Track all your job applications on JobPortal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <span class="nav-brand">⚡ JobPortal</span>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="dashboard-header">
  <h1 id="greeting">Seeker Dashboard</h1>
  <p>Track the status of all your job applications.</p>
</div>

<!-- ── Stats ── -->
<div class="stats-row" id="stats-row"></div>

<!-- ── Resume Upload Section ── -->
<!-- This card lets the seeker upload or replace their resume -->
<div class="section" style="padding-top:0; margin-bottom: 0">
  <div style="max-width:600px; background:var(--surface); border:1px solid var(--surface2); border-radius:var(--radius); padding:28px">
    <h2 style="font-size:1.15rem; font-weight:700; margin-bottom:16px">📄 My Resume</h2>

    <!-- This div shows the current status — filled by JS below -->
    <div id="resume-status" style="margin-bottom:16px; font-size:0.95rem; color:var(--muted)">Checking…</div>

    <!-- File input: only PDF and DOCX are accepted -->
    <div class="form-group" style="margin-bottom:12px">
      <label for="resume-file">Upload Resume (PDF or DOCX, max 5 MB)</label>
      <input type="file" id="resume-file" accept=".pdf,.docx" style="margin-top:6px">
    </div>

    <!-- Error and success messages shown after upload attempt -->
    <div id="resume-error"   style="color:var(--danger);  margin-bottom:8px; display:none"></div>
    <div id="resume-success" style="color:var(--success); margin-bottom:8px; display:none"></div>

    <button class="btn btn-primary btn-sm" id="resume-upload-btn" onclick="uploadResume()">⬆ Upload Resume</button>
  </div>
</div>

<!-- ── Applications Table ── -->
<div class="section" style="padding-top:0">
  <div class="flex justify-between items-center mb-4">
    <h2 class="section-title" style="margin-bottom:0">My Applications</h2>
    <a href="jobs.html" class="btn btn-primary btn-sm">+ Browse Jobs</a>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Job Title</th>
          <th>Company</th>
          <th>Location</th>
          <th>Applied On</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="app-table-body">
        <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="app.js"></script>
<script>
    renderNav('nav-links');
  // Redirect if not a seeker
  const user = requireLogin('seeker');
  if (user) {
    renderNav();
    document.getElementById('greeting').textContent = 'Welcome, ' + user.name + ' 👋';

    async function loadApplications() {
      const res  = await apiFetch('/applications');
      const apps = await res.json();

      const stats = document.getElementById('stats-row');
      const total       = apps.length;
      const shortlisted = apps.filter(a => a.status === 'Shortlisted').length;
      const rejected    = apps.filter(a => a.status === 'Rejected').length;

      stats.innerHTML = `
        <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Applied</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--success)">${shortlisted}</div><div class="stat-label">Shortlisted</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--danger)">${rejected}</div><div class="stat-label">Rejected</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--warn)">${total - shortlisted - rejected}</div><div class="stat-label">Pending</div></div>
      `;

      const tbody = document.getElementById('app-table-body');
      if (!apps.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="big">📭</div>No applications yet. <a href="jobs.html">Browse jobs →</a></div></td></tr>`;
        return;
      }

      tbody.innerHTML = apps.map((a, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${a.jobTitle || '—'}</strong></td>
          <td>${a.company || '—'}</td>
          <td>${a.location || '—'}</td>
          <td>${formatDate(a.appliedDate)}</td>
          <td><span class="${badgeClass(a.status)}">${a.status}</span></td>
        </tr>
      `).join('');
    }

    loadApplications();

    // ── Resume Upload Logic ────────────────────────────────────────────────────

    // checkResumeStatus() — fetch /my-resume and update the status text
    async function checkResumeStatus() {
      const res  = await apiFetch('/my-resume');
      const data = await res.json();
      const statusEl = document.getElementById('resume-status');

      if (data.hasResume) {
        // Show a green tick and the filename
        statusEl.innerHTML = `<span style="color:var(--success)">✅ Resume uploaded: <strong>${data.fileName}</strong></span>`;
      } else {
        // Show a red cross
        statusEl.innerHTML = `<span style="color:var(--danger)">❌ No resume uploaded yet.</span>`;
      }
    }

    // uploadResume() — read the file from the input and POST it as multipart FormData
    window.uploadResume = async function () {
      const fileInput = document.getElementById('resume-file');
      const errEl     = document.getElementById('resume-error');
      const sucEl     = document.getElementById('resume-success');
      const btn       = document.getElementById('resume-upload-btn');

      // Hide previous messages
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      // Make sure the user actually selected a file
      if (!fileInput.files || fileInput.files.length === 0) {
        errEl.textContent  = 'Please choose a file first.';
        errEl.style.display = 'block';
        return;
      }

      const file = fileInput.files[0];

      // FormData automatically sets the correct multipart/form-data Content-Type
      // (including the boundary string the server needs to split the file)
      const formData = new FormData();
      formData.append('file', file); // 'file' must match @RequestParam("file") in Java

      btn.textContent = 'Uploading…';
      btn.disabled    = true;

      // We use fetch() directly (NOT apiFetch) because apiFetch sets
      // Content-Type: application/json, which would break multipart uploads.
      // Instead we manually add the X-User-Id and X-User-Role headers.
      const user = getUser(); // from app.js
      const res = await fetch('http://localhost:8080/upload-resume', {
        method:      'POST',
        credentials: 'include',          // send session cookie
        headers: {
          'Authorization': 'Bearer ' + user.token,
          // NOTE: Do NOT set Content-Type here — the browser sets it automatically
          //       for FormData, including the required boundary parameter.
        },
        body: formData,                  // the file data
      });

      const data = await res.json();

      if (res.ok) {
        sucEl.textContent  = '✅ ' + data.message;
        sucEl.style.display = 'block';
        fileInput.value    = '';          // clear the file input
        checkResumeStatus();             // refresh the status display
      } else {
        errEl.textContent  = '❌ ' + (data.error || 'Upload failed.');
        errEl.style.display = 'block';
      }

      btn.textContent = '⬆ Upload Resume';
      btn.disabled    = false;
    };

    checkResumeStatus(); // run on page load to show current status
  }
</script>
</body>
</html>
