<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — JobPortal</title>
  <meta name="description" content="Login to your JobPortal account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <span class="nav-brand">⚡ JobPortal</span>
    <div class="nav-links" id="nav-links"></div>
</nav>

<div class="form-card">
  <h2>Welcome Back</h2>
  <p>Login to your account to continue.</p>

  <div id="error-msg" style="color:var(--danger);margin-bottom:12px;display:none;"></div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="john@example.com" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Your password" required>
    </div>

    <button id="submit-btn" class="btn btn-primary form-submit" type="submit">Login →</button>
  </form>

  <p class="mt-4 text-sm text-muted">Don't have an account? <a href="register.html">Register here</a></p>

  <p class="mt-4 text-sm text-muted" style="border-top:1px solid var(--surface2);padding-top:12px;">
    <strong>Admin?</strong> Ask the admin to seed your account directly in the database.
  </p>
</div>

<script src="app.js"></script>
<script>
    renderNav('nav-links');

  // If already logged in, redirect to correct dashboard
  const existing = getUser();
  if (existing) {
    if (existing.role === 'seeker')   window.location.href = 'seeker-dashboard.html';
    if (existing.role === 'employer') window.location.href = 'employer-dashboard.html';
    if (existing.role === 'admin')    window.location.href = 'admin-dashboard.html';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const errorEl = document.getElementById('error-msg');
    const btn     = document.getElementById('submit-btn');

    errorEl.style.display = 'none';
    btn.textContent = 'Logging in…';
    btn.disabled = true;

    const body = {
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    };

    try {
      const res  = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify(body) });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Login failed.';
        errorEl.style.display = 'block';
      } else {
        // Store user info in localStorage
        localStorage.setItem('user', JSON.stringify(data));

        // Route to correct dashboard by role
        if (data.role === 'SEEKER')   window.location.href = 'seeker-dashboard.html';
        if (data.role === 'EMPLOYER') window.location.href = 'employer-dashboard.html';
        if (data.role === 'ADMIN')    window.location.href = 'admin-dashboard.html';
      }
    } catch(err) {
      errorEl.textContent = 'Cannot reach server. Is the backend running?';
      errorEl.style.display = 'block';
    }

    btn.textContent = 'Login →';
    btn.disabled = false;
  }
</script>
</body>
</html>
