<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPortal — Find Your Dream Job</title>
  <meta name="description" content="Browse thousands of job listings and apply instantly on JobPortal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Navbar ── -->
<nav>
  <span class="nav-brand">⚡ JobPortal</span>
  <div class="nav-links" id="nav-links"></div>
</nav>

<!-- ── Hero ── -->
<section class="hero">
  <h1>Find Jobs That <span>Match You</span></h1>
  <p>Thousands of opportunities from top companies — search, apply, get hired.</p>
  <div class="search-bar">
    <input id="search-input" type="text" placeholder="Search by job title, skill, or company…" />
    <button id="search-btn" onclick="searchJobs()">Search</button>
  </div>
</section>

<!-- ── Job Listings ── -->
<section class="section">
  <h2 class="section-title">Latest Jobs</h2>
  <div class="grid" id="jobs-grid">
    <div class="empty-state"><div class="big">⏳</div>Loading jobs…</div>
  </div>
</section>

<script src="app.js"></script>
<script>
  // Render nav based on login state
  renderNav('nav-links');

  // Load all jobs on page load
  async function loadJobs(title = '') {
    const grid = document.getElementById('jobs-grid');
    grid.innerHTML = '<div class="empty-state"><div class="big">⏳</div>Loading…</div>';

    const url = title ? `/jobs?title=${encodeURIComponent(title)}` : '/jobs';
    const res = await apiFetch(url);
    const jobs = await res.json();

    if (!jobs.length) {
      grid.innerHTML = '<div class="empty-state"><div class="big">🔍</div>No jobs found.</div>';
      return;
    }

    // Inside index.html - loadJobs function
grid.innerHTML = jobs.map(j => `
  <div class="card" onclick="window.location='/jobs.html#${j.id}'">
    <div class="card-title">${j.title}</div>
    <div class="card-company">${j.company}</div>
    <div class="card-meta">
      <span class="tag">📍 ${j.location}</span>
      <span class="tag">💼 ${j.type}</span>
    </div>
    <div class="card-desc">${j.description || 'No description provided.'}</div>
    <div class="card-footer">
      <span class="card-date">${formatDate(j.postedDate)}</span>
      <a href="jobs.html#${j.id}" class="btn btn-primary btn-sm">View →</a>
    </div>
  </div>
`).join('');
  }

  function searchJobs() {
    const q = document.getElementById('search-input').value.trim();
    loadJobs(q);
  }

  // Allow search on Enter key
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchJobs();
  });

  loadJobs();
</script>
</body>
</html>
