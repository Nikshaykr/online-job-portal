<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — JobPortal</title>
  <meta name="description" content="Create your JobPortal account as a Job Seeker or Employer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <span class="nav-brand">⚡ JobPortal</span>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<div class="form-card">
  <h2>Create Account</h2>
  <p>Join thousands of job seekers and employers on JobPortal.</p>

  <div id="error-msg" style="color:var(--danger);margin-bottom:12px;display:none;"></div>
  <div id="success-msg" style="color:var(--success);margin-bottom:12px;display:none;"></div>

  <form id="register-form" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input id="name" type="text" placeholder="John Doe" pattern="[A-Za-z\s]+" title="Name should only contain letters and spaces" minlength="2" required>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="john@example.com" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Choose a password" minlength="4" required>
    </div>

    <div class="form-group">
      <label for="role">I am a…</label>
      <select id="role" required>
        <option value="">Select role</option>
        <option value="seeker">Job Seeker</option>
        <option value="employer">Employer</option>
      </select>
    </div>

    <button id="submit-btn" class="btn btn-primary form-submit" type="submit">Register →</button>
  </form>

  <p class="mt-4 text-sm text-muted">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script src="app.js"></script>
<script>
  async function handleRegister(e) {
    e.preventDefault();
    const errorEl   = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');
    const btn       = document.getElementById('submit-btn');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';
    btn.textContent = 'Registering…';
    btn.disabled = true;

    const body = {
      name:     document.getElementById('name').value.trim(),
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      role:     document.getElementById('role').value,
    };

    try {
      const res  = await apiFetch('/register', { method: 'POST', body: JSON.stringify(body) });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Registration failed. Try again.';
        errorEl.style.display = 'block';
      } else {
        successEl.textContent = '✅ Account created! Redirecting to login…';
        successEl.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);
      }
    } catch (err) {
      errorEl.textContent = 'Cannot reach server. Is the backend running?';
      errorEl.style.display = 'block';
    }

    btn.textContent = 'Register →';
    btn.disabled = false;
  }
</script>
</body>
</html>
