<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs — JobPortal</title>
  <meta name="description" content="Search and filter job listings on JobPortal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <span class="nav-brand">⚡ JobPortal</span>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="dashboard-header">
  <h1>Browse Jobs</h1>
  <p>Search and filter from all available positions.</p>
</div>

<!-- ── Filters ── -->
<div class="filter-row">
  <input id="f-title"    type="text"   placeholder="🔍 Job title or keyword">
  <input id="f-location" type="text"   placeholder="📍 Location">
  <select id="f-type">
    <option value="">All Types</option>
    <option>Full-time</option>
    <option>Part-time</option>
    <option>Internship</option>
    <option>Remote</option>
  </select>
  <button class="btn btn-primary" onclick="loadJobs()">Search</button>
</div>

<!-- ── Job Grid ── -->
<div class="section" style="padding-top:0">
  <div class="grid" id="jobs-grid">
    <div class="empty-state"><div class="big">⏳</div>Loading…</div>
  </div>
</div>

<!-- ── Apply Modal ── -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:32px;max-width:480px;width:90%">
    <h3 id="modal-title" style="margin-bottom:8px;font-size:1.2rem;"></h3>
    <p id="modal-company" style="color:var(--accent);margin-bottom:12px;"></p>
    <p id="modal-desc" style="color:var(--muted);font-size:0.9rem;margin-bottom:24px;"></p>
    <div id="modal-actions" style="display:flex;gap:12px;flex-wrap:wrap;"></div>
    <button onclick="closeModal()" class="btn btn-outline mt-4" style="margin-top:12px;">Close</button>
  </div>
</div>

<script src="app.js"></script>
<script>
    renderNav('nav-links');
    const user = getUser();
    let selectedJob = null;

    async function loadJobs() {
      const grid = document.getElementById('jobs-grid');
      grid.innerHTML = '<div class="empty-state"><div class="big">⏳</div>Loading…</div>';

      const params = new URLSearchParams({
        title:    document.getElementById('f-title').value.trim(),
        location: document.getElementById('f-location').value.trim(),
        type:     document.getElementById('f-type').value,
      });

      const res  = await apiFetch('/jobs?' + params);
      const jobs = await res.json();

      if (!jobs.length) {
        grid.innerHTML = '<div class="empty-state"><div class="big">🔍</div>No jobs found.</div>';
        return;
      }

      grid.innerHTML = jobs.map(j => `
        <div class="card" onclick="openJob(${JSON.stringify(j).replace(/"/g,'&quot;')})">
          <div class="card-title">${j.title}</div>
          <div class="card-company">${j.company}</div>
          <div class="card-meta">
            <span class="tag">📍 ${j.location}</span>
            <span class="tag">💼 ${j.type}</span>
          </div>
          <div class="card-desc">${j.description || 'No description.'}</div>
          <div class="card-footer">
            <span class="card-date">${formatDate(j.postedDate)}</span>
            <span class="btn btn-primary btn-sm">View Details →</span>
          </div>
        </div>
      `).join('');
    }

    function openJob(job) {
      selectedJob = job;
      document.getElementById('modal-title').textContent   = job.title;
      document.getElementById('modal-company').textContent = job.company + ' · ' + job.location + ' · ' + job.type;
      document.getElementById('modal-desc').textContent    = job.description || 'No description provided.';

      const actions = document.getElementById('modal-actions');
      if (user && user.role === 'seeker') {
        actions.innerHTML = `<button class="btn btn-primary" onclick="applyNow(${job.id})">✅ Apply Now</button>`;
      } else if (!user) {
        actions.innerHTML = `<a href="login.html" class="btn btn-primary">Login to Apply</a>`;
      } else {
        actions.innerHTML = `<span class="text-muted text-sm">You cannot apply as a ${user.role}.</span>`;
      }

      const overlay = document.getElementById('modal-overlay');
      overlay.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    async function applyNow(jobId) {
      const btn = document.querySelector('#modal-actions button');
      btn.textContent = 'Applying…';
      btn.disabled = true;

      const res = await apiFetch('/applications', { method: 'POST', body: JSON.stringify({ jobId }) });
      const data = await res.json();

      if (res.ok) {
        btn.textContent = '✅ Applied!';
        btn.className = 'btn btn-success';
      } else {
        btn.textContent = data.error || 'Failed';
        btn.disabled = false;
      }
    }

    // ── Debounced Live Search ─────────────────────────────────────────────────
    // debounce() returns a new function that delays calling 'fn' until the user
    // has stopped triggering it for 'delay' milliseconds.
    // This prevents sending an API request on every single keystroke.
    function debounce(fn, delay) {
      let timer; // stores the timeout reference
      return function () {
        clearTimeout(timer);             // cancel the previous scheduled call
        timer = setTimeout(fn, delay);  // schedule a new call after 'delay' ms
      };
    }

    // Wrap loadJobs in a 500ms debounce — results update while typing
    const debouncedSearch = debounce(loadJobs, 500);

    // Listen for any keystroke in the title and location text inputs
    document.getElementById('f-title').addEventListener('input', debouncedSearch);
    document.getElementById('f-location').addEventListener('input', debouncedSearch);
    // Listen for changes on the type dropdown (fires immediately on selection change)
    document.getElementById('f-type').addEventListener('change', loadJobs);

    loadJobs();
</script>
</body>
</html>
